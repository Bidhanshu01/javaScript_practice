<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: antiquewhite;">
value	State	  Description
0	UNSENT	     Client has been created. open() not called yet.
1	OPENED	     open() has been called.
2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	LOADING	    Downloading; responseText holds partial data.
4	DONE	    The operation is complete.
</body>
<script>
    const requestURL = "https://api.github.com/users/Bidhanshu01";
    const xhr=new XMLHttpRequest();    //XMLHttpREquest use for httpRequest
    xhr.open("GET",requestURL);        // open not called that is why we use send 
    xhr.onreadystatechange = function(){
        console.log(xhr.readyState);
        if(xhr.readyState === 4){
            
            //console.log(this.responseText);   // to get all the data 

            //for specific data
            const data = JSON.parse(this.responseText)       // use JSON.parse to convert string into json
            console.log(typeof data);    // Object
            console.log(data.name);      // Bidhanshu thakur
            console.log(data.company);   // null
        }
    }
    xhr.send();
</script>
</html>
